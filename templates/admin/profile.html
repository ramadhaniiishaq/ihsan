{% extends "base.html" %}

{% block title %}Profile Admin{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-modern p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle" style="font-size: 4rem; color: var(--color-deep);"></i>
                    <h3 class="mt-3">Profile Admin</h3>
                    <p class="text-muted">Username: {{ username }}</p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Password Saat Ini</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Password Baru</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Konfirmasi Password Baru</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-custom w-100">
                        <i class="bi bi-key"></i> Ganti Password
                    </button>
                </form>
                
                <hr class="my-4">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle"></i> Password akan dienkripsi menggunakan bcrypt untuk keamanan maksimal.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
